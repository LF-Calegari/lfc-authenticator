# Raiz do repositório. Requer arquivo .env (veja .env.example).
# Rede padrão: externa compartilhada com os demais serviços do ecossistema (ex.: Kurtto); criar antes com `docker network create` (ver README).
# Uso: docker compose up -d
# Migrações (primeira vez / após mudar migrations): docker compose --profile migrate run --rm migrate
# Testes de integração (PostgreSQL real): docker compose --profile test run --rm test

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=AuthServiceDb;Username=auth;Password=${POSTGRES_PASSWORD}"
      DEFAULT_SYSTEM_USER_PASSWORD: "${DEFAULT_SYSTEM_USER_PASSWORD:-toor}"
      ADMIN_SYSTEM_USER_PASSWORD: "${ADMIN_SYSTEM_USER_PASSWORD:-admin}"
      DEFAULT_USER_PASSWORD: "${DEFAULT_USER_PASSWORD:-default}"
    ports:
      - "8080:5042"
    volumes:
      - ./AuthService:/app
    working_dir: /app
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: AuthServiceDb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d AuthServiceDb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Aplica migrations no AuthServiceDb (usa a mesma imagem do app para ter dotnet-ef no PATH).
  migrate:
    profiles: [migrate]
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=AuthServiceDb;Username=auth;Password=${POSTGRES_PASSWORD}"
    volumes:
      - ./AuthService:/app
    working_dir: /app
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
    # dotnet-tools.json no volume faz o SDK exigir tool restore antes de `dotnet ef`.
    command: ["sh", "-c", "dotnet restore && dotnet tool restore && dotnet ef database update"]

  # Testes de integração: monta a raiz do repo; PostgreSQL em db:5432 na rede do compose.
  test:
    profiles: [test]
    image: mcr.microsoft.com/dotnet/sdk:10.0
    env_file:
      - .env
    environment:
      AUTH_SERVICE_TEST_PG_BASE: "Host=db;Port=5432;Username=auth;Password=${POSTGRES_PASSWORD}"
      DEFAULT_SYSTEM_USER_PASSWORD: "${DEFAULT_SYSTEM_USER_PASSWORD:-toor}"
      ADMIN_SYSTEM_USER_PASSWORD: "${ADMIN_SYSTEM_USER_PASSWORD:-admin}"
      DEFAULT_USER_PASSWORD: "${DEFAULT_USER_PASSWORD:-default}"
    volumes:
      - .:/workspace
    working_dir: /workspace
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
    command: ["dotnet", "test", "AuthService.Tests/AuthService.Tests.csproj", "-v", "minimal"]

volumes:
  pg_data:

networks:
  default:
    external: true
    name: ${EXTERNAL_NETWORK_NAME:-lfc_platform_network}
